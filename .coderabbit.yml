# CodeRabbit Configuration: https://docs.coderabbit.ai/configuration
reviews:
  profile: "chill"
  request_reviews_from_completions: true
  high_level_summary: true
  poetic: false
  # Summarize the massive AI updates
  auto_review:
    enabled: true
    ignore_paths:
      - "node_modules/**"
      - ".venv/**"
chat:
  enabled: true
