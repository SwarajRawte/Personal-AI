/**
 * Render Blueprint Specification
 * Used for automated deployment of the Kortex backend.
 */

services:
  - type: web
    name: kortex-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app -k uvicorn.workers.UvicornWorker
    plan: free # Use the free tier
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kortex-db
          property: connectionString
      - key: GOOGLE_API_KEY
        sync: false # Set manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000

databases:
  - name: kortex-db
    plan: free
    region: ohio
