# Render Blueprint Specification
# Used for automated deployment of the Kortex backend.

services:
  - type: web
    name: kortex-backend
    region: ohio
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: sh -c "cd backend && python -m uvicorn main:app --host 0.0.0.0 --port $PORT"
    plan: free # Use the free tier
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kortex-db
          property: connectionString
      - key: GOOGLE_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: NOTION_SECRET
        sync: false
      - key: MAGIC_API_KEY
        sync: false
      - key: HCL_API_KEY
        sync: false
      - key: HCL_API_BASE
        sync: false
      - key: HCL_API_VERSION
        sync: false
      - key: HCL_DEPLOYMENT
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000

databases:
  - name: kortex-db
    plan: free
    region: ohio
