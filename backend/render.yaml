services:
  - type: web
    name: kortex-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: SESSION_SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: "*"
